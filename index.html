<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DASHA-GOTCHI v02 - ENHANCED</title>
    <style>
        :root {
            --bg-color: #88a040;
            --text-color: #1a1f08;
            --border: 3px solid var(--text-color);
        }

        body.retro-green { --bg-color: #88a040; --text-color: #1a1f08; }
        body.monochrome   { --bg-color: #b0b0b0; --text-color: #000; }
        body.blue         { --bg-color: #001d3d; --text-color: #00ccff; }
        body.orange       { --bg-color: #2b1000; --text-color: #ff8c00; }
        body.red          { --bg-color: #1a0000; --text-color: #ff0000; }

        @keyframes scroll-once {
            0% { transform: translateX(100%); opacity: 1; }
            80% { transform: translateX(-150%); opacity: 1; }
            100% { transform: translateX(-180%); opacity: 0; }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 10px;
            display: flex; justify-content: center;
            height: 100vh; overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        .dashboard {
            width: 100%; max-width: 450px;
            display: flex; flex-direction: column;
            gap: 8px; border: var(--border);
            padding: 15px; border-radius: 20px;
            background: inherit; align-self: center;
        }

        header {
            text-align: center;
            border-bottom: var(--border);
            padding-bottom: 5px;
            margin-bottom: 2px;
        }

        header h1 { margin: 0; font-size: 1.1rem; letter-spacing: 2px; }

        .panel { border: var(--border); padding: 8px; text-align: center; background: rgba(0,0,0,0.05); }
        .row { display: flex; gap: 8px; width: 100%; }
        .half { width: 50%; }

        #avatar { font-size: 4.5rem; min-height: 90px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        #speed { font-size: 4.5rem; line-height: 1; }
        #clock { font-size: 1.4rem; font-weight: bold; }
        
        #direction { 
            font-size: 3rem; 
            font-weight: 900; 
            display: inline-block;
            margin-top: 2px;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            font-size: 0.85rem;
            font-weight: bold;
            align-items: center;
        }

        #quote-container {
            font-size: 1.2rem; min-height: 30px;
            overflow: hidden; white-space: nowrap;
            position: relative; font-weight: bold;
        }

        .scroll-once {
            position: absolute;
            animation: scroll-once 6s linear forwards;
        }

        #altGraph {
            width: 100%; height: 50px;
            border-top: 1px solid var(--text-color);
            margin-top: 5px;
        }

        button {
            background: var(--text-color); color: var(--bg-color);
            border: none; padding: 10px; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
            font-size: 0.75rem;
        }
    </style>
</head>
<body class="retro-green">

    <div class="dashboard" id="mainDash">
        <header>
            <h1>DASHA-GOTCHI ver_02</h1>
        </header>

        <div class="row">
            <div class="panel half">
                <div id="avatar">~_~</div>
            </div>
            <div class="panel half">
                <div id="clock">00:00:00</div>
                <div><span id="direction">N</span></div>
            </div>
        </div>

        <div class="panel">
            <div style="font-size: 0.6rem; text-align: left; margin-bottom: 4px; opacity: 0.8;">LOCAL METEO (FAHRENHEIT & CENTIGRADE)</div>
            <div class="weather-grid">
                <div><span id="weather-icon">--</span></div>
                <div style="line-height: 1.2;">
                    <span id="temp-val">--</span>°F<br>
                    <span id="temp-val-c" style="font-size: 1rem; border-top: 1px solid;">--</span>°C
                </div>
                <div style="font-size: 0.7rem;">WIND: <span id="wind-val">--</span><br>MPH</div>
            </div>
        </div>

        <div class="panel">
            <div id="speed">0</div>
            <div style="font-size:0.8rem">MPH | TOP: <span id="top-speed">0</span></div>
            <div style="font-size: 0.7rem; margin-top: 5px; border-top: 1px dotted;">
                DIST: <span id="dist-mi">0.00</span> MI | <span id="dist-km">0.00</span> KM
            </div>
        </div>

        <div class="panel">
            <div class="row" style="justify-content: space-around; font-size: 1.1rem;">
                <div>ALT: <span id="alt">0</span> FT</div>
                <div>GRAD: <span id="grad">0</span>%</div>
            </div>
            <canvas id="altGraph"></canvas>
        </div>

        <div class="panel">
            <div id="quote-container"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">

            <button onclick="cycleTheme()">🎨 Color</button>
            <button onclick="calibrateLevel()">⚖️ Level</button>
            <button onclick="resetAll()">🔄 Reset</button>
        </div>
    </div>
